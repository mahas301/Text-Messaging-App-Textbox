trigger:
- main  # runs when you push to main branch

pool:
  name: Default

steps:
# Step 1: Checkout code
- checkout: self

# Step 2: Install Node.js
- task: UseNode@1
  inputs:
    version: '18.x'
  displayName: "Install Node.js"

# Step 3: Install dependencies
- script: |
    npm install
  displayName: "Install dependencies"

# Step 4: Run a test script
- script: |
    echo "TextBox app pipeline is working 🚀"
  displayName: "Run a test script"